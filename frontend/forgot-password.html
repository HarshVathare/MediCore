<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{--bg:#050d1a;--surface:#0a1628;--card:#0f1f35;--border:rgba(0,200,180,0.15);--teal:#00c8b4;--teal-glow:rgba(0,200,180,0.25);--text:#e8f4f8;--muted:#6b8fa3;--error:#ff6b8a;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,180,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,180,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;}
    .bg-orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,180,0.10),transparent 70%);top:-100px;right:-80px;}
    .bg-orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(79,172,254,0.08),transparent 70%);bottom:-80px;left:-100px;}
    .box{position:relative;z-index:10;background:var(--card);border-radius:24px;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px var(--border);width:100%;max-width:440px;padding:48px 44px;}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
    .brand-icon{width:40px;height:40px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#050d1a;box-shadow:0 6px 20px rgba(0,200,180,0.4);}
    .brand-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;}
    .brand-name span{color:var(--teal);}
    .icon-wrap{width:70px;height:70px;background:rgba(0,200,180,0.08);border:2px solid rgba(0,200,180,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--teal);margin-bottom:24px;}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;}
    .sub{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:32px;}
    .field{margin-bottom:22px;}
    .field label{display:block;font-size:0.78rem;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.8px;}
    .field-wrap{position:relative;}
    .field-wrap i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;pointer-events:none;transition:0.3s;z-index:1;}
    .field input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:13px 14px 13px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:all 0.3s;outline:none;}
    .field input::placeholder{color:var(--muted);}
    .field input:focus{border-color:var(--teal);background:rgba(0,200,180,0.04);box-shadow:0 0 0 4px var(--teal-glow);}
    .field-wrap:focus-within i{color:var(--teal);}
    .alert{border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:0.875rem;display:none;align-items:center;gap:8px;}
    .alert-error{background:rgba(255,107,138,0.08);border:1px solid rgba(255,107,138,0.3);color:var(--error);}
    .alert-success{background:rgba(0,200,180,0.08);border:1px solid rgba(0,200,180,0.3);color:var(--teal);}
    .btn-main{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--teal),#00a896);color:#050d1a;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s;}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,200,180,0.4);}
    .btn-main.loading{pointer-events:none;opacity:0.7;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(5,13,26,0.3);border-top-color:#050d1a;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-link{display:flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:0.875rem;margin-top:24px;transition:0.2s;justify-content:center;}
    .back-link:hover{color:var(--teal);}
    @media(max-width:480px){.box{padding:36px 24px;}}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="box">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
    <div class="brand-name">Medi<span>Core</span></div>
  </div>
  <div class="icon-wrap"><i class="fas fa-key"></i></div>
  <h1>Forgot Password?</h1>
  <p class="sub">No worries. Enter your email and we'll send you a reset link to get back into your account.</p>

  <div id="errorBox" class="alert alert-error"><i class="fas fa-exclamation-circle"></i><span id="errorText"></span></div>
  <div id="successBox" class="alert alert-success"><i class="fas fa-check-circle"></i><span id="successText"></span></div>

  <form id="forgotForm">
    <div class="field">
      <label>Email Address</label>
      <div class="field-wrap">
        <input type="email" id="email" placeholder="you@example.com" required/>
        <i class="fas fa-envelope"></i>
      </div>
    </div>
    <button type="submit" class="btn-main" id="sendBtn">Send Reset Link</button>
  </form>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
</div>

<script>
  const API = 'https://medicore-p9x7.onrender.com/api';
  // const API='http://localhost:8080/api';
  const form=document.getElementById('forgotForm');
  const btn=document.getElementById('sendBtn');

  function show(id,msg){
    const b=document.getElementById(id);
    b.querySelector('span').textContent=msg;
    b.style.display='flex';
    if(id==='errorBox') setTimeout(()=>b.style.display='none',5000);
  }

  form.addEventListener('submit',async e=>{
    e.preventDefault();
    const email=document.getElementById('email').value.trim();
    if(!email) return show('errorBox','Please enter your email');

    btn.classList.add('loading');
    btn.innerHTML='<span class="spinner"></span>Sending...';

    try{
      const res=await fetch(`${API}/auth/forgot-password?email=${encodeURIComponent(email)}`,{method:'POST'});
      const text=await res.text();
      if(res.ok){
        show('successBox','Reset link sent! Check your inbox.');
        document.getElementById('email').value='';
      } else {
        show('errorBox',text||'Failed to send reset link');
      }
    } catch(err){
      show('errorBox','Network error. Please try again.');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML='Send Reset Link';
    }
  });
</script>
</body>
</html>
