<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - MediCare Hospital</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .register-box {
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        max-width: 400px;
        width: 100%;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        border-radius: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .title {
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 5px 0;
      }

      .subtitle {
        opacity: 0.9;
        font-size: 0.9rem;
        margin: 0;
      }

      .form-container {
        padding: 40px 30px;
      }

      /* FIXED: Perfect input alignment */
      .input-wrapper {
        position: relative;
        margin-bottom: 25px;
      }

      .form-control,
      .form-select {
        width: 100%;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 15px 20px 15px 50px !important;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background: #fafbfc;
        height: 56px;
        box-sizing: border-box;
      }

      textarea.form-control {
        height: auto;
        min-height: 100px;
        padding: 15px 20px 50px 50px !important;
        resize: vertical;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
        background: white;
        transform: translateY(-2px);
        outline: none;
      }

      .input-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        font-size: 1.1rem;
        transition: 0.3s ease;
        z-index: 2;
        pointer-events: none;
      }

      textarea.form-control ~ .input-icon {
        top: 18px;
      }

      .form-control:focus ~ .input-icon,
      .form-select:focus ~ .input-icon {
        color: #667eea;
      }

      .row-cols-2 > * {
        padding-right: 0.75rem;
        padding-left: 0.75rem;
      }

      .btn-register {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        padding: 15px 30px;
        width: 100%;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        height: 56px;
      }

      .btn-register:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        color: white;
      }

      .links {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #e9ecef;
      }

      .links a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
      }

      .links a:hover {
        color: #5a67d8;
      }

      .error {
        background: #fed7d7;
        border: 1px solid #fc8181;
        color: #c53030;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: none;
        font-size: 0.9rem;
      }

      .loading {
        position: relative;
        color: transparent;
      }

      .loading::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid transparent;
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 576px) {
        .register-box {
          margin: 10px;
        }
        .header,
        .form-container {
          padding-left: 20px;
          padding-right: 20px;
        }
        .logo {
          width: 70px;
          height: 70px;
        }
        .form-control,
        .form-select {
          padding: 12px 16px 12px 45px !important;
          font-size: 0.9rem;
        }
        textarea.form-control {
          padding: 12px 16px 45px 45px !important;
        }
        .input-icon {
          left: 15px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-box">
      <div class="header">
        <div class="logo">
          <img src="assets/icons/Medicore.png" alt="MediCore Logo" />
        </div>
        <h1 class="title">Create Account</h1>
        <p class="subtitle">Join MediCare today</p>
      </div>

      <div class="form-container">
        <div id="errorMsg" class="error">
          <i class="fas fa-exclamation-circle me-2"></i>
          <span id="errorText"></span>
        </div>

        <form id="registerForm">
          <div class="input-wrapper">
            <input
              type="text"
              class="form-control"
              id="regName"
              placeholder="Full Name"
              required
            />
            <i class="fas fa-user input-icon"></i>
          </div>

          <div class="input-wrapper">
            <input
              type="email"
              class="form-control"
              id="regEmail"
              placeholder="Email Address"
              required
            />
            <i class="fas fa-envelope input-icon"></i>
          </div>

          <div class="input-wrapper">
            <input
              type="password"
              class="form-control"
              id="regPassword"
              placeholder="Password"
              required
            />
            <i class="fas fa-lock input-icon"></i>
          </div>

          <div class="row row-cols-1 row-cols-md-2 g-3 mb-4">
            <div class="col">
              <div class="input-wrapper">
                <input
                  type="number"
                  class="form-control"
                  id="regAge"
                  placeholder="Age"
                  min="1"
                  max="120"
                  required
                />
                <i class="fas fa-calendar input-icon"></i>
              </div>
            </div>
            <div class="col">
              <div class="input-wrapper">
                <select class="form-select" id="regGender" required>
                  <option value="">Select Gender</option>
                  <option value="MALE">Male</option>
                  <option value="FEMALE">Female</option>
                </select>
                <i class="fas fa-venus-mars input-icon"></i>
              </div>
            </div>
          </div>

          <div class="input-wrapper">
            <textarea
              class="form-control"
              id="regMedicalHistory"
              placeholder="Medical History (Optional)"
            ></textarea>
            <i class="fas fa-notes-medical input-icon"></i>
          </div>

          <button type="submit" class="btn-register">
            <i class="fas fa-user-plus me-2"></i>Register Account
          </button>
        </form>

        <div class="links">
          <p style="margin-bottom: 10px; color: #6c757d; font-size: 0.9rem">
            Already have an account? <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8080/api";
      const form = document.getElementById("registerForm");
      const errorDiv = document.getElementById("errorMsg");
      const errorText = document.getElementById("errorText");
      const btn = form.querySelector(".btn-register");

      function showError(msg) {
        errorText.textContent = msg;
        errorDiv.style.display = "block";
        setTimeout(() => (errorDiv.style.display = "none"), 4000);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
          name: document.getElementById("regName").value.trim(),
          email: document.getElementById("regEmail").value.trim(),
          password: document.getElementById("regPassword").value,
          age: parseInt(document.getElementById("regAge").value),
          gender: document.getElementById("regGender").value,
          medicalHistory:
            document.getElementById("regMedicalHistory").value.trim() || "",
        };

        if (data.name.length < 2)
          return showError("Name must be at least 2 characters");
        if (!/^\S+@\S+\.\S+$/.test(data.email))
          return showError("Please enter valid email");
        if (data.password.length < 6)
          return showError("Password must be at least 6 characters");
        if (data.age < 1 || data.age > 120)
          return showError("Please enter valid age");
        if (!data.gender) return showError("Please select gender");

        btn.classList.add("loading");
        btn.innerHTML =
          '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';

        try {
          const response = await fetch(`${API_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          const result = await response.json();

          if (response.ok) {
            alert("Registration successful! Please check your email.");
            window.location.href = "login.html";
          } else {
            showError(result.message || "Registration failed");
          }
        } catch (error) {
          showError("Network error. Please try again.");
        } finally {
          btn.classList.remove("loading");
          btn.innerHTML =
            '<i class="fas fa-user-plus me-2"></i>Register Account';
        }
      });
    </script>
  </body>
</html>
