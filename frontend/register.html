<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <style>
    :root{
      --bg:#050d1a;--surface:#0a1628;--card:#0f1f35;
      --border:rgba(0,200,180,0.15);--teal:#00c8b4;
      --teal-glow:rgba(0,200,180,0.25);--accent:#4facfe;
      --text:#e8f4f8;--muted:#6b8fa3;--error:#ff6b8a;--success:#00c8b4;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,180,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,180,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
    .bg-orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;}
    .bg-orb-1{width:450px;height:450px;background:radial-gradient(circle,rgba(0,200,180,0.10),transparent 70%);top:-150px;left:-100px;}
    .bg-orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(79,172,254,0.08),transparent 70%);bottom:-100px;right:-80px;}

    .box{
      position:relative;z-index:10;
      background:var(--card);
      border-radius:24px;
      box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px var(--border);
      width:100%;max-width:540px;
      overflow:hidden;
    }
    .box-header{
      background:linear-gradient(135deg,#061428,#0a2540);
      padding:36px 44px 32px;
      border-bottom:1px solid var(--border);
    }
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .brand-icon{width:40px;height:40px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#050d1a;box-shadow:0 6px 20px rgba(0,200,180,0.4);}
    .brand-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;}
    .brand-name span{color:var(--teal);}
    h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:4px;}
    .sub{color:var(--muted);font-size:0.875rem;}

    .box-body{padding:36px 44px 44px;}
    .error-box{background:rgba(255,107,138,0.08);border:1px solid rgba(255,107,138,0.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;color:var(--error);font-size:0.875rem;display:none;align-items:center;gap:8px;}
    .success-box{background:rgba(0,200,180,0.08);border:1px solid rgba(0,200,180,0.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;color:var(--success);font-size:0.875rem;display:none;align-items:center;gap:8px;}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .field{margin-bottom:20px;}
    .field label{display:block;font-size:0.78rem;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.8px;}
    .field-wrap{position:relative;}
    .field-wrap i{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;pointer-events:none;transition:0.3s;z-index:1;}
    textarea~i,.field-wrap:has(textarea) i{top:18px;transform:none;}
    .field input,.field select,.field textarea{
      width:100%;background:var(--surface);border:1.5px solid var(--border);
      border-radius:11px;padding:13px 14px 13px 42px;
      color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;
      transition:all 0.3s;outline:none;appearance:none;
    }
    .field select{cursor:pointer;}
    .field textarea{padding-top:14px;resize:vertical;min-height:90px;}
    .field input::placeholder,.field textarea::placeholder{color:var(--muted);}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:rgba(0,200,180,0.04);box-shadow:0 0 0 4px var(--teal-glow);}
    .field-wrap:focus-within i{color:var(--teal);}

    .section-label{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

    .btn-main{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--teal),#00a896);color:#050d1a;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,200,180,0.4);}
    .btn-main:active{transform:translateY(0);}
    .btn-main.loading{pointer-events:none;opacity:0.7;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(5,13,26,0.3);border-top-color:#050d1a;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .links{margin-top:20px;text-align:center;color:var(--muted);font-size:0.875rem;}
    .links a{color:var(--teal);text-decoration:none;font-weight:500;}
    .links a:hover{text-decoration:underline;}
    @media(max-width:560px){.row{grid-template-columns:1fr;gap:0;}.box-header,.box-body{padding-left:24px;padding-right:24px;}}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="box">
  <div class="box-header">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
      <div class="brand-name">Medi<span>Core</span></div>
    </div>
    <h1>Create Account</h1>
    <p class="sub">Join MediCore as a patient today</p>
  </div>
  <div class="box-body">
    <div id="errorBox" class="error-box"><i class="fas fa-exclamation-circle"></i><span id="errorText"></span></div>
    <div id="successBox" class="success-box"><i class="fas fa-check-circle"></i><span id="successText"></span></div>

    <form id="regForm">
      <div class="section-label">Personal Information</div>
      <div class="field">
        <label>Full Name</label>
        <div class="field-wrap">
          <input type="text" id="name" placeholder="Dr. John Smith" required/>
          <i class="fas fa-user"></i>
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <div class="field-wrap">
          <input type="email" id="email" placeholder="you@example.com" required/>
          <i class="fas fa-envelope"></i>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="field-wrap">
          <input type="password" id="password" placeholder="Minimum 6 characters" required/>
          <i class="fas fa-lock"></i>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Age</label>
          <div class="field-wrap">
            <input type="number" id="age" placeholder="25" min="1" max="120" required/>
            <i class="fas fa-calendar-alt"></i>
          </div>
        </div>
        <div class="field">
          <label>Gender</label>
          <div class="field-wrap">
            <select id="gender" required>
              <option value="">Select</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
            </select>
            <i class="fas fa-venus-mars"></i>
          </div>
        </div>
      </div>
      <div class="section-label">Medical Information</div>
      <div class="field">
        <label>Medical History <span style="color:var(--muted);font-size:0.75rem;">(Optional)</span></label>
        <div class="field-wrap">
          <textarea id="medical" placeholder="Any previous conditions, allergies, surgeries..."></textarea>
          <i class="fas fa-notes-medical"></i>
        </div>
      </div>
      <button type="submit" class="btn-main" id="regBtn">Create Account</button>
    </form>
    <div class="links">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
</div>

<script>
  // const API = 'http://localhost:8080/api';
   const API = 'https://medicore-p9x7.onrender.com/api';
  const form = document.getElementById('regForm');
  const btn = document.getElementById('regBtn');

  function showError(msg){
    const b=document.getElementById('errorBox');
    document.getElementById('errorText').textContent=msg;
    b.style.display='flex';
    setTimeout(()=>b.style.display='none',5000);
  }
  function showSuccess(msg){
    const b=document.getElementById('successBox');
    document.getElementById('successText').textContent=msg;
    b.style.display='flex';
  }

  form.addEventListener('submit', async e=>{
    e.preventDefault();
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const age=parseInt(document.getElementById('age').value);
    const gender=document.getElementById('gender').value;
    const medicalHistory=document.getElementById('medical').value.trim();

    if(name.length<2) return showError('Name must be at least 2 characters');
    if(!/^\S+@\S+\.\S+$/.test(email)) return showError('Enter a valid email');
    if(password.length<6) return showError('Password must be at least 6 characters');
    if(!age||age<1||age>120) return showError('Enter a valid age');
    if(!gender) return showError('Please select a gender');

    btn.classList.add('loading');
    btn.innerHTML='<span class="spinner"></span>Creating Account...';

    try{
      const res=await fetch(`${API}/auth/register`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,email,password,age,gender,medicalHistory})
      });
      const data=await res.json();
      if(res.ok){
        showSuccess('Account created! Please check your email to verify.');
        setTimeout(()=>window.location.href='index.html',3000);
      } else {
        showError(data.message||'Registration failed');
      }
    } catch(err){
      showError('Network error. Please try again.');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML='Create Account';
    }
  });
</script>
</body>
</html>
