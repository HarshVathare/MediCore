<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MediCare Hospital</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .login-box {
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        max-width: 400px;
        width: 100%;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        border-radius: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
      }

      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .title {
        font-size: 1.6rem;
        font-weight: 700;
        margin: 0 0 5px 0;
      }

      .subtitle {
        opacity: 0.9;
        font-size: 0.9rem;
        margin: 0;
      }

      .form-container {
        padding: 40px 30px;
      }

      .input-group {
        position: relative;
        margin-bottom: 25px;
      }

      .form-control {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 15px 20px 15px 50px;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        background: #fafbfc;
      }

      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
        background: white;
        transform: translateY(-2px);
      }

      .input-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #adb5bd;
        font-size: 1.1rem;
        transition: 0.3s ease;
      }

      .form-control:focus + .input-icon {
        color: #667eea;
      }

      .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        padding: 15px 30px;
        width: 100%;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        color: white;
      }

      .links {
        text-align: center;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid #e9ecef;
      }

      .links a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
      }

      .links a:hover {
        color: #5a67d8;
      }

      .error {
        background: #fed7d7;
        border: 1px solid #fc8181;
        color: #c53030;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: none;
        font-size: 0.9rem;
      }

      .loading {
        position: relative;
        color: transparent;
      }

      .loading::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid transparent;
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 576px) {
        .login-box {
          margin: 10px;
        }
        .header,
        .form-container {
          padding-left: 20px;
          padding-right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="header">
        <div class="logo">
          <img src="assets/icons/Medicore.png" alt="MediCore Logo" />
        </div>
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Please sign in to your account</p>
      </div>

      <div class="form-container">
        <div id="errorMsg" class="error">
          <i class="fas fa-exclamation-circle me-2"></i>
          <span id="errorText"></span>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <input
              type="email"
              class="form-control"
              id="loginEmail"
              placeholder="Enter your email"
              required
            />
            <i class="fas fa-envelope input-icon"></i>
          </div>

          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="loginPassword"
              placeholder="Enter your password"
              required
            />
            <i class="fas fa-lock input-icon"></i>
          </div>

          <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="links">
          <p style="margin-bottom: 10px; color: #6c757d; font-size: 0.9rem">
            Don't have an account? <a href="register.html">Sign up</a>
          </p>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8080/api";
      const form = document.getElementById("loginForm");
      const errorDiv = document.getElementById("errorMsg");
      const errorText = document.getElementById("errorText");
      const btn = form.querySelector("button");

      function showError(msg) {
        errorText.textContent = msg;
        errorDiv.style.display = "block";
        setTimeout(() => (errorDiv.style.display = "none"), 4000);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        if (!email || !password) {
          showError("Please fill all fields");
          return;
        }

        btn.classList.add("loading");
        btn.textContent = "Signing In...";

        try {
          const res = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (res.ok) {
            localStorage.setItem("accessToken", data.accessToken);
            localStorage.setItem("refreshToken", data.refreshToken);
            localStorage.setItem("userId", data.user_Id);
            localStorage.setItem("email", data.email);
            localStorage.setItem("role", data.role);

            setTimeout(() => {
              const role = data.role;
              if (role === "PATIENT") window.location.href = "dashboard.html";
              else if (role === "DOCTOR")
                window.location.href = "docter-dashboard.html";
              else if (role === "ADMIN")
                window.location.href = "admin-dashboard.html";
              else alert("Unknown role");
            }, 600);
          } else {
            showError(data.message || "Login failed");
          }
        } catch (err) {
          showError("Network error. Please try again.");
        } finally {
          btn.classList.remove("loading");
          btn.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
